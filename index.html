<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문장투시경 (G-ray) 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="css/style_v14.css">
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function LoginApp() {
            const [loginStep, setLoginStep] = useState("SELECTION"); // SELECTION, TEACHER, STUDENT

            return (
                <div id="screen-login">
                    <div className="login-container">
                        <div className="login-card">
                            <div className="login-header">
                                <h1 className="login-title">문장투시경</h1>
                            </div>
                            <p className="login-subtitle">원하는 역할을 선택하고 학습을 시작하세요.</p>

                            {loginStep === "SELECTION" && (
                                <div className="role-selection">
                                    <div className="role-card" onClick={() => setLoginStep("TEACHER")}>
                                        <div className="role-title">선생님 로그인 ›</div>
                                        <div className="role-desc">문제 관리 <br />학생 관리 기능을 <br />사용할 수 있어요.</div>
                                        <div className="role-foot">
                                            <div className="role-icon-chip">
                                                <svg viewBox="0 0 24 24"><path d="M12 14c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" stroke="currentColor" fill="none" strokeWidth="2" /></svg>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="role-card" onClick={() => setLoginStep("STUDENT")}>
                                        <div className="role-title">학생용 로그인 ›</div>
                                        <div className="role-desc">문장 투시 학습을 <br />공부할 수 있어요.</div>
                                        <div className="role-foot">
                                            <div className="role-icon-chip">
                                                <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" fill="none" strokeWidth="2" /></svg>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {(loginStep === "TEACHER" || loginStep === "STUDENT") && (
                                <div className="login-body">
                                    {loginStep === "TEACHER" ? (
                                        <>
                                            <div className="login-input-group">
                                                <input type="text" className="login-input" placeholder="교사 인증 코드" />
                                            </div>
                                            <div className="login-input-group">
                                                <input type="text" className="login-input" placeholder="이름" />
                                            </div>
                                            <button className="login-submit"
                                                onClick={() => {
                                                    sessionStorage.setItem('isLoggedIn', 'true');
                                                    sessionStorage.setItem('userRole', 'teacher');
                                                    window.location.href = 'main.html';
                                                }}>
                                                확인
                                            </button>
                                        </>
                                    ) : (
                                        <>
                                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "16px" }}>
                                                <input type="text" className="login-input" placeholder="학년" />
                                                <input type="text" className="login-input" placeholder="반" />
                                            </div>
                                            <div className="login-input-group">
                                                <input type="text" className="login-input" placeholder="출석 번호" />
                                            </div>
                                            <div className="login-input-group">
                                                <input type="text" className="login-input" placeholder="이름" />
                                            </div>
                                            <button className="login-submit"
                                                onClick={() => {
                                                    sessionStorage.setItem('isLoggedIn', 'true');
                                                    sessionStorage.setItem('userRole', 'student');
                                                    window.location.href = 'main.html';
                                                }}>
                                                확인
                                            </button>
                                        </>
                                    )}
                                    <button className="login-back-btn" onClick={() => setLoginStep("SELECTION")}>
                                        뒤로가기
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LoginApp />);
    </script>
</body>

</html>
